services:
  affine-todo-bridge:
    build: .
    container_name: affine-todo-bridge
    restart: unless-stopped
    environment:
      AFFINE_URL: https://affine.avernus.cloud
      AFFINE_TOKEN: ${AFFINE_TOKEN}
      AFFINE_WORKSPACE_ID: ${AFFINE_WORKSPACE_ID}
      AFFINE_TODO_DOC_ID: ${AFFINE_TODO_DOC_ID:-}
    networks:
      - proxy   # ← Name deines shared Docker-Netzwerks (aus: docker network ls)

networks:
  proxy:
    external: true
