services:
  affine-todo-bridge:
    build:
      context: https://github.com/david-stefan-hermann/n8n-Workflows.git#master:affine-todo-bridge
    container_name: affine-todo-bridge
    restart: unless-stopped
    environment:
      AFFINE_TOKEN: ***
      AFFINE_WORKSPACE_ID: ***
      AFFINE_TODO_DOC_ID: ""   # optional: AFFiNE-Page-ID für feste Inbox-Seite
    networks:
      - ix-n8n_ix-internal-n8n-net

networks:
  ix-n8n_ix-internal-n8n-net:
    external: true
